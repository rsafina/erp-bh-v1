<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipes — Cafe ERP</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .recipe-grid {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        align-items: start;
      }
      .menu-list-item {
        padding: 12px 16px;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid var(--border);
        margin-bottom: 8px;
        transition: all 0.15s;
      }
      .menu-list-item:hover {
        border-color: var(--amber-dim);
        background: var(--amber-glow);
      }
      .menu-list-item.selected {
        border-color: var(--amber);
        background: var(--amber-glow);
      }
      .menu-list-item .menu-name {
        font-weight: 600;
        color: var(--text);
      }
      .menu-list-item .menu-meta {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .std-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
      }
      .std-item {
        background: var(--surface-2);
        border-radius: 8px;
        padding: 14px;
      }
      .std-item .label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-family: "Inter", sans-serif;
      }
      .std-item .value {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--amber);
        margin-top: 4px;
      }
      .std-item .unit {
        font-size: 11px;
        color: var(--text-dim);
      }
      .ing-row td {
        padding: 8px 12px !important;
      }
      .empty-recipe {
        padding: 40px;
        text-align: center;
        color: var(--text-muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="main">
        <div class="topbar">
          <span class="topbar-title">Recipes</span>
          <div class="topbar-right">
            <span class="status-dot"></span><span>Cafe ERP</span>
          </div>
        </div>
        <div class="page-content">
          <div class="page-header">
            <div>
              <h1>Recipe Manager</h1>
              <p>Standard yields and ingredient compositions per menu item</p>
            </div>
            <button class="btn btn-primary" id="btn-add-menu">
              ＋ Add Menu
            </button>
          </div>

          <div class="recipe-grid">
            <!-- Left: menu list -->
            <div>
              <div class="card">
                <div class="card-header">
                  <span class="card-title">Menu Items</span>
                </div>
                <div class="card-body" id="menu-list">
                  <div
                    class="loader"
                    style="display: block; margin: 20px auto"
                  ></div>
                </div>
              </div>
            </div>

            <!-- Right: recipe detail -->
            <div id="recipe-detail">
              <div class="card">
                <div class="card-body empty-recipe">
                  <div
                    style="font-size: 36px; opacity: 0.3; margin-bottom: 12px"
                  >
                    📋
                  </div>
                  <p>Select a menu item on the left to view its recipe</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Menu Modal -->
    <div class="modal-overlay" id="modal-menu">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-menu-title">Add Menu Item</span>
          <button class="btn-icon" onclick="closeModal('modal-menu')">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-menu-id-original" />
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Menu ID</label>
              <input
                type="text"
                id="menu-id"
                class="form-control"
                placeholder="e.g. MENU001"
                disabled
              />
            </div>
            <div class="form-group">
              <label class="form-label">Menu Name</label>
              <input
                type="text"
                id="menu-name"
                class="form-control"
                placeholder="e.g. Cappuccino"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Selling Price (Rp)</label>
            <input
              type="number"
              id="menu-selling-price"
              class="form-control"
              placeholder="e.g. 35000"
              min="0"
              step="100"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="menu-active" class="form-control">
              <option value="true">Active</option>
              <option value="false">Inactive</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-menu')">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveMenu()">
            Save Menu
          </button>
        </div>
      </div>
    </div>

    <!-- Add Ingredient Modal -->
    <div class="modal-overlay" id="modal-ing">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="modal-ing-title"
            >Add Ingredient to Recipe</span
          >
          <button class="btn-icon" onclick="closeModal('modal-ing')">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-ing-id" />
          <div class="form-group">
            <label class="form-label">Menu Item</label>
            <select id="ing-menu" class="form-control"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Ingredient</label>
            <select id="ing-ingredient" class="form-control"></select>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Quantity</label>
              <input
                type="number"
                id="ing-qty"
                class="form-control"
                placeholder="e.g. 500"
                min="0"
                step="0.01"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Usage Unit</label>
              <select id="ing-unit" class="form-control">
                <option value="gr">gr</option>
                <option value="ml">ml</option>
                <option value="pcs">pcs</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-ing')">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveIngredient()">
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- Edit Standard Modal -->
    <div class="modal-overlay" id="modal-std">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Edit Recipe Standard</span>
          <button class="btn-icon" onclick="closeModal('modal-std')">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="std-menu-id" />
          <div class="form-group">
            <label class="form-label">Menu Item</label>
            <input
              type="text"
              id="std-menu-name"
              class="form-control"
              disabled
            />
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Standard Yield (gr)</label>
              <input type="number" id="std-yield" class="form-control" />
            </div>
            <div class="form-group">
              <label class="form-label">Standard Portion (gr)</label>
              <input type="number" id="std-portion" class="form-control" />
            </div>
            <div class="form-group">
              <label class="form-label">Portions per Batch</label>
              <input type="number" id="std-ppb" class="form-control" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modal-std')">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveStandard()">
            Save Standard
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
      const db = getSupabase();
      let menuItems = [],
        ingredients = [],
        standards = {},
        recipeIngredients = {},
        costSummary = {};
      let selectedMenu = null;

      async function load() {
        const [mi, ing, std, ri, cs] = await Promise.all([
          db
            .from("items")
            .select(
              "item_id, item_name, effective_cost, cost_per_usage_unit, selling_price",
            )
            .eq("category", "Menu")
            .eq("is_active", true)
            .order("item_name"),
          db
            .from("items")
            .select(
              "item_id, item_name, effective_cost, cost_per_usage_unit, category",
            )
            .in("category", ["Ingredient", "Prep"])
            .eq("is_active", true)
            .order("item_name"),
          db.from("recipe_standard").select("*"),
          db
            .from("recipe_ingredients")
            .select(
              "*, ingredients:ingredient_id(item_name, usage_unit, effective_cost, cost_per_usage_unit)",
            ),
          db.from("recipe_cost_summary").select("*"),
        ]);
        menuItems = mi.data || [];
        ingredients = ing.data || [];
        std.data?.forEach((r) => (standards[r.menu_item_id] = r));
        ri.data?.forEach((r) => {
          if (!recipeIngredients[r.menu_item_id])
            recipeIngredients[r.menu_item_id] = [];
          recipeIngredients[r.menu_item_id].push(r);
        });
        cs.data?.forEach((r) => (costSummary[r.menu_item_id] = r));
        renderMenuList();
        populateSelects();
      }

      function renderMenuList() {
        const el = document.getElementById("menu-list");
        if (!menuItems.length) {
          el.innerHTML =
            '<p style="color:var(--text-muted);font-size:13px">No menu items found</p>';
          return;
        }
        el.innerHTML = menuItems
          .map(
            (m) => `
    <div class="menu-list-item ${selectedMenu === m.item_id ? "selected" : ""}" onclick="selectMenu('${m.item_id}')">
      <div class="menu-name">${m.item_name}</div>
      <div class="menu-meta">${m.item_id} · ${(recipeIngredients[m.item_id] || []).length} ingredients</div>
    </div>`,
          )
          .join("");
      }

      function selectMenu(id) {
        selectedMenu = id;
        renderMenuList();
        renderDetail();
      }

      function renderDetail() {
        const m = menuItems.find((x) => x.item_id === selectedMenu);
        if (!m) return;
        const std = standards[selectedMenu];
        const ings = recipeIngredients[selectedMenu] || [];

        document.getElementById("recipe-detail").innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <span class="card-title">${m.item_name}</span>
          <span class="badge badge-amber" style="margin-left:8px">${m.item_id}</span>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="openStdModal('${m.item_id}','${m.item_name}')">✏ Edit Standard</button>
      </div>
      <div class="card-body">
        ${
          std
            ? `
        <div class="std-grid">
          <div class="std-item">
            <div class="label">Std Yield</div>
            <div class="value">${fmtNum(std.standard_yield_gram)}</div>
            <div class="unit">grams / batch</div>
          </div>
          <div class="std-item">
            <div class="label">Std Portion</div>
            <div class="value">${fmtNum(std.standard_portion_gram)}</div>
            <div class="unit">grams / portion</div>
          </div>
          <div class="std-item">
            <div class="label">Portions / Batch</div>
            <div class="value">${fmtNum(std.std_portion_per_batch)}</div>
            <div class="unit">portions</div>
          </div>
          <div style="background:var(--surface-2);border-radius:8px;padding:14px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px">
          <div class="std-item">
            <div class="label">Batch Cost</div>
            <div class="value" style="font-size:15px">${costSummary[m.item_id] ? fmtCurrency(costSummary[m.item_id].batch_cost) : "—"}</div>
            <div class="unit">total ingredients</div>
          </div>
          <div class="std-item">
            <div class="label">Cost / Portion</div>
            <div class="value" style="font-size:15px">${costSummary[m.item_id] ? fmtCurrency(costSummary[m.item_id].cost_per_portion) : "—"}</div>
            <div class="unit">per portion</div>
          </div>
          <div class="std-item">
            <div class="label">Selling Price</div>
            <div class="value" style="font-size:15px">${m.selling_price ? fmtCurrency(m.selling_price) : "—"}</div>
            <div class="unit">per portion</div>
          </div>
          <div class="std-item">
            <div class="label">Actual Margin</div>
            <div class="value" style="font-size:15px;color:${costSummary[m.item_id]?.actual_margin_pct > 0 ? "var(--green)" : "var(--red)"}">${costSummary[m.item_id]?.actual_margin_pct != null ? (costSummary[m.item_id].actual_margin_pct * 100).toFixed(1) + "%" : "—"}</div>
            <div class="unit">gross margin</div>
          </div>
        </div>
        </div>`
            : `<div style="background:var(--surface-2);border-radius:8px;padding:14px;margin-bottom:20px;color:var(--text-muted);font-size:13px">⚠ No recipe standard set. <button class="btn btn-secondary btn-sm" style="margin-left:8px" onclick="openStdModal('${m.item_id}','${m.item_name}')">Add Standard</button></div>`
        }

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="card-title">Ingredients</div>
          <button class="btn btn-secondary btn-sm" onclick="openIngModal('${m.item_id}')">＋ Add Ingredient</button>
        </div>

        ${
          ings.length
            ? `
        <table class="erp-table">
          <thead><tr><th>#</th><th>Ingredient</th><th>Quantity</th><th>Unit</th><th>Cost/Unit</th><th>Line Cost</th><th></th></tr></thead>
          <tbody>
            ${ings
              .map((r, i) => {
                const unitCost =
                  r.ingredients?.effective_cost ??
                  r.ingredients?.cost_per_usage_unit ??
                  null;
                const lineCost =
                  unitCost != null ? r.qty_usage_unit * unitCost : null;
                return `
            <tr class="ing-row">
              <td class="muted">${i + 1}</td>
              <td><strong>${r.ingredients?.item_name ?? r.ingredient_id}</strong></td>
              <td class="mono">${fmtNum(r.qty_usage_unit)}</td>
              <td class="muted">${r.usage_unit}</td>
              <td class="mono" style="color:var(--text-muted)">${unitCost != null ? fmtCurrency(unitCost) : "—"}</td>
              <td class="mono text-amber">${lineCost != null ? fmtCurrency(lineCost) : "—"}</td>
              <td>
                <button class="btn-icon" title="Edit" onclick="editIng(${r.id},'${r.menu_item_id}','${r.ingredient_id}',${r.qty_usage_unit},'${r.usage_unit}')">✏</button>
                <button class="btn-icon" title="Delete" style="margin-left:4px;color:var(--red)" onclick="deleteIng(${r.id})">✕</button>
              </td>
            </tr>`;
              })
              .join("")}
          </tbody>
        </table>`
            : `<div style="text-align:center;padding:32px;color:var(--text-muted)">No ingredients added yet</div>`
        }
      </div>
    </div>`;
      }

      function openStdModal(id, name) {
        const std = standards[id] || {};
        document.getElementById("std-menu-id").value = id;
        document.getElementById("std-menu-name").value = name;
        document.getElementById("std-yield").value =
          std.standard_yield_gram ?? "";
        document.getElementById("std-portion").value =
          std.standard_portion_gram ?? "";
        document.getElementById("std-ppb").value =
          std.std_portion_per_batch ?? "";
        openModal("modal-std");
      }

      async function saveStandard() {
        const id = document.getElementById("std-menu-id").value;
        const payload = {
          menu_item_id: id,
          standard_yield_gram: Number(
            document.getElementById("std-yield").value,
          ),
          standard_portion_gram: Number(
            document.getElementById("std-portion").value,
          ),
          std_portion_per_batch: Number(
            document.getElementById("std-ppb").value,
          ),
          updated_at: new Date().toISOString(),
        };
        const { error } = await db
          .from("recipe_standard")
          .upsert(payload, { onConflict: "menu_item_id" });
        if (error) {
          handleSbError(error, "Save standard");
          return;
        }
        showToast("Recipe standard saved!");
        standards[id] = payload;
        closeModal("modal-std");
        renderDetail();
      }

      function populateSelects() {
        const menuSel = document.getElementById("ing-menu");
        menuSel.innerHTML = menuItems
          .map((m) => `<option value="${m.item_id}">${m.item_name}</option>`)
          .join("");
        const ingSel = document.getElementById("ing-ingredient");
        const rawIngs = ingredients.filter((i) => i.category === "Ingredient");
        const prepIngs = ingredients.filter((i) => i.category === "Prep");
        let ingHtml = "";
        if (rawIngs.length) {
          ingHtml +=
            `<optgroup label="Ingredient">` +
            rawIngs
              .map(
                (i) => `<option value="${i.item_id}">${i.item_name}</option>`,
              )
              .join("") +
            `</optgroup>`;
        }
        if (prepIngs.length) {
          ingHtml +=
            `<optgroup label="Prep">` +
            prepIngs
              .map(
                (i) => `<option value="${i.item_id}">${i.item_name}</option>`,
              )
              .join("") +
            `</optgroup>`;
        }
        ingSel.innerHTML = ingHtml;
      }

      function openIngModal(menuId) {
        document.getElementById("modal-ing-title").textContent =
          "Add Ingredient";
        document.getElementById("edit-ing-id").value = "";
        document.getElementById("ing-menu").value =
          menuId || menuItems[0]?.item_id || "";
        document.getElementById("ing-qty").value = "";
        document.getElementById("ing-unit").value = "gr";
        openModal("modal-ing");
      }

      function editIng(id, menuId, ingId, qty, unit) {
        document.getElementById("modal-ing-title").textContent =
          "Edit Ingredient";
        document.getElementById("edit-ing-id").value = id;
        document.getElementById("ing-menu").value = menuId;
        document.getElementById("ing-ingredient").value = ingId;
        document.getElementById("ing-qty").value = qty;
        document.getElementById("ing-unit").value = unit;
        openModal("modal-ing");
      }

      async function saveIngredient() {
        const payload = {
          menu_item_id: document.getElementById("ing-menu").value,
          ingredient_id: document.getElementById("ing-ingredient").value,
          qty_usage_unit: Number(document.getElementById("ing-qty").value),
          usage_unit: document.getElementById("ing-unit").value,
        };
        if (!payload.qty_usage_unit) {
          showToast("Enter a quantity", "error");
          return;
        }
        const editId = document.getElementById("edit-ing-id").value;
        let error;
        if (editId) {
          ({ error } = await db
            .from("recipe_ingredients")
            .update(payload)
            .eq("id", editId));
        } else {
          ({ error } = await db.from("recipe_ingredients").insert(payload));
        }
        if (error) {
          handleSbError(error, "Save ingredient");
          return;
        }
        showToast(editId ? "Ingredient updated!" : "Ingredient added!");
        closeModal("modal-ing");
        // reload ingredients for this menu
        const { data } = await db
          .from("recipe_ingredients")
          .select("*, ingredients:ingredient_id(item_name, usage_unit)")
          .eq("menu_item_id", payload.menu_item_id);
        recipeIngredients[payload.menu_item_id] = data || [];
        renderMenuList();
        if (selectedMenu === payload.menu_item_id) renderDetail();
      }

      async function deleteIng(id) {
        if (!confirm("Remove this ingredient from the recipe?")) return;
        const { error } = await db
          .from("recipe_ingredients")
          .delete()
          .eq("id", id);
        if (error) {
          handleSbError(error, "Delete ingredient");
          return;
        }
        showToast("Ingredient removed");
        // reload
        const { data } = await db
          .from("recipe_ingredients")
          .select("*, ingredients:ingredient_id(item_name, usage_unit)")
          .eq("menu_item_id", selectedMenu);
        recipeIngredients[selectedMenu] = data || [];
        renderMenuList();
        renderDetail();
      }

      function generateMenuId() {
        const prefix = "MENU";
        const existingIds = menuItems
          .filter((i) => i.item_id.startsWith(prefix))
          .map((i) => i.item_id);
        return generateId(prefix, existingIds);
      }

      function openMenuModal() {
        document.getElementById("modal-menu-title").textContent =
          "Add Menu Item";
        document.getElementById("edit-menu-id-original").value = "";
        document.getElementById("menu-id").value = generateMenuId();
        document.getElementById("menu-name").value = "";
        document.getElementById("menu-selling-price").value = "";
        document.getElementById("menu-active").value = "true";
        openModal("modal-menu");
      }

      async function saveMenu() {
        const name = document.getElementById("menu-name").value.trim();
        if (!name) {
          showToast("Menu name is required", "error");
          return;
        }
        const originalId = document.getElementById(
          "edit-menu-id-original",
        ).value;
        const payload = {
          item_id: document.getElementById("menu-id").value.trim(),
          item_name: name,
          category: "Menu",
          selling_price:
            Number(document.getElementById("menu-selling-price").value) || null,
          is_active: document.getElementById("menu-active").value === "true",
        };
        let error;
        if (originalId) {
          ({ error } = await db
            .from("items")
            .update(payload)
            .eq("item_id", originalId));
        } else {
          ({ error } = await db.from("items").insert(payload));
        }
        if (error) {
          handleSbError(error, "Save menu");
          return;
        }
        showToast(originalId ? "Menu item updated!" : "Menu item added!");
        closeModal("modal-menu");
        // Reload and re-render
        menuItems = [];
        recipeIngredients = {};
        standards = {};
        costSummary = {};
        await load();
      }

      document
        .getElementById("btn-add-menu")
        .addEventListener("click", openMenuModal);
      load();
    </script>
  </body>
</html>
