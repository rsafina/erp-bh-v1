<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Current Stock — Cafe ERP</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .stock-bar { height:5px; border-radius:3px; background:var(--border); overflow:hidden; margin-top:5px; width:100px; }
    .stock-fill { height:100%; border-radius:3px; }
  </style>
</head>
<body>
<div class="layout">
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Current Stock</span>
      <div class="topbar-right"><span class="status-dot"></span><span>Cafe ERP</span></div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Current Stock</h1>
          <p>Live view computed from the stock ledger</p>
        </div>
        <button class="btn btn-secondary" onclick="load()">↻ Refresh</button>
      </div>

      <div class="stat-grid" style="margin-bottom:24px">
        <div class="stat-card">
          <div class="stat-label">Total SKUs</div>
          <div class="stat-value" id="stat-skus">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">In Stock</div>
          <div class="stat-value text-green" id="stat-instock">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Zero / Negative</div>
          <div class="stat-value text-red" id="stat-zero">—</div>
        </div>
      </div>

      <div class="filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" class="form-control" placeholder="Search item…" oninput="applyFilter()" />
        </div>
        <select id="filter-status" class="form-control" style="width:160px" onchange="applyFilter()">
          <option value="">All Stock Levels</option>
          <option value="ok">In Stock (> 0)</option>
          <option value="zero">Zero / Negative</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="erp-table">
            <thead>
              <tr>
                <th>Item ID</th>
                <th>Item Name</th>
                <th>Current Stock</th>
                <th>Unit</th>
                <th>Stock Level</th>
                <th>Last Movement</th>
              </tr>
            </thead>
            <tbody id="stock-tbody">
              <tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
const db = getSupabase();
let all = [];

async function load() {
  document.getElementById('stock-tbody').innerHTML =
    `<tr class="loading-row"><td colspan="6"><div class="loader"></div></td></tr>`;

  const { data, error } = await db.from('stock_current').select('*').order('item_id');
  if (error) { handleSbError(error, 'Load stock'); return; }
  all = data || [];

  const inStock = all.filter(r => r.current_stock > 0).length;
  const zero    = all.filter(r => r.current_stock <= 0).length;
  document.getElementById('stat-skus').textContent    = all.length;
  document.getElementById('stat-instock').textContent = inStock;
  document.getElementById('stat-zero').textContent    = zero;

  render(all);
}

function render(data) {
  const tbody = document.getElementById('stock-tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">◉</div><p>No stock data</p></div></td></tr>`;
    return;
  }
  const max = Math.max(...data.map(r => r.current_stock || 0), 1);
  tbody.innerHTML = data.map(r => {
    const pct = Math.min(Math.max((r.current_stock / max) * 100, 0), 100);
    const color = r.current_stock > 0 ? 'var(--green)' : 'var(--red)';
    return `<tr>
      <td class="mono">${r.item_id}</td>
      <td><strong>${r.item_name}</strong></td>
      <td class="mono" style="color:${color}">${fmtNum(r.current_stock)}</td>
      <td class="muted">${r.usage_unit ?? '—'}</td>
      <td>
        <div class="stock-bar">
          <div class="stock-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </td>
      <td class="muted">${fmtDate(r.last_updated)}</td>
    </tr>`;
  }).join('');
}

function applyFilter() {
  const q  = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  render(all.filter(r =>
    (!q || r.item_name.toLowerCase().includes(q) || r.item_id.toLowerCase().includes(q)) &&
    (!st || (st === 'ok' ? r.current_stock > 0 : r.current_stock <= 0))
  ));
}

load();
</script>
</body>
</html>
