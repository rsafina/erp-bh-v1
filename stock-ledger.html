<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Ledger — Cafe ERP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Stock Ledger</span>
      <div class="topbar-right"><span class="status-dot"></span><span>Cafe ERP</span></div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Stock Ledger</h1>
          <p>Immutable log of all inventory movements</p>
        </div>
        <button class="btn btn-primary" id="btn-adj">＋ Manual Adjustment</button>
      </div>

      <div class="filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" class="form-control" placeholder="Search item or reference…" oninput="applyFilter()" />
        </div>
        <select id="filter-source" class="form-control" style="width:170px" onchange="applyFilter()">
          <option value="">All Sources</option>
          <option value="OPENING">OPENING</option>
          <option value="PURCHASE">PURCHASE</option>
          <option value="PROD_USE">PROD_USE</option>
          <option value="PROD_OUT">PROD_OUT</option>
          <option value="ADJUSTMENT">ADJUSTMENT</option>
        </select>
        <input type="date" id="filter-from" class="form-control" style="width:150px" onchange="applyFilter()" />
        <input type="date" id="filter-to"   class="form-control" style="width:150px" onchange="applyFilter()" />
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="erp-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Item ID</th>
                <th>Item Name</th>
                <th>IN (+)</th>
                <th>OUT (−)</th>
                <th>Source</th>
                <th>Reference</th>
                <th>Recorded</th>
              </tr>
            </thead>
            <tbody id="ledger-tbody">
              <tr class="loading-row"><td colspan="8"><div class="loader"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination" style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border)">
          <span id="page-info" style="font-size:12px;color:var(--text-muted)"></span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="changePage(-1)">← Prev</button>
            <button class="btn btn-secondary btn-sm" id="btn-next" onclick="changePage(1)">Next →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Adjustment Modal -->
<div class="modal-overlay" id="modal-adj">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Manual Stock Adjustment</span>
      <button class="btn-icon" onclick="closeModal('modal-adj')">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--amber-glow);border:1px solid var(--amber-dim);border-radius:8px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--amber)">
        ⚠ Adjustments are permanent ledger entries. Use for corrections only.
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" id="adj-date" class="form-control" />
      </div>
      <div class="form-group">
        <label class="form-label">Item</label>
        <select id="adj-item" class="form-control"></select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Direction</label>
          <select id="adj-dir" class="form-control">
            <option value="in">IN (Add stock)</option>
            <option value="out">OUT (Remove stock)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input type="number" id="adj-qty" class="form-control" min="0" step="0.01" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Reference / Reason</label>
        <input type="text" id="adj-ref" class="form-control" placeholder="e.g. stock count correction" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-adj')">Cancel</button>
      <button class="btn btn-primary" onclick="saveAdj()">Post Adjustment</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
const db = getSupabase();
let all = [], filtered = [], items = [];
let page = 0;
const PAGE_SIZE = 50;

const SOURCE_COLORS = {
  OPENING:    'badge-muted',
  PURCHASE:   'badge-blue',
  PROD_USE:   'badge-red',
  PROD_OUT:   'badge-green',
  ADJUSTMENT: 'badge-amber',
};

async function load() {
  const [ledger, itm] = await Promise.all([
    db.from('stock_ledger')
      .select('*, items(item_name)')
      .order('date', { ascending: false })
      .order('id', { ascending: false })
      .limit(2000),
    db.from('items').select('*').eq('is_active', true).order('item_name'),
  ]);
  all = ledger.data || [];
  items = itm.data || [];
  filtered = all;
  page = 0;
  renderPage();
  populateSelect();
}

function renderPage() {
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('ledger-tbody');

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">≡</div><p>No ledger entries found</p></div></td></tr>`;
    document.getElementById('page-info').textContent = '';
  } else {
    tbody.innerHTML = slice.map(r => `
      <tr>
        <td class="muted">${fmtDate(r.date)}</td>
        <td class="mono">${r.item_id}</td>
        <td>${r.items?.item_name ?? r.item_id}</td>
        <td class="mono text-green">${r.in_qty > 0 ? '+' + fmtNum(r.in_qty) : '—'}</td>
        <td class="mono text-red">${r.out_qty > 0 ? '−' + fmtNum(r.out_qty) : '—'}</td>
        <td><span class="badge ${SOURCE_COLORS[r.source] || 'badge-muted'}">${r.source}</span></td>
        <td class="muted">${r.ref ?? '—'}</td>
        <td class="muted">${fmtDate(r.created_at)}</td>
      </tr>`).join('');
    document.getElementById('page-info').textContent =
      `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, filtered.length)} of ${filtered.length}`;
  }

  document.getElementById('btn-prev').disabled = page === 0;
  document.getElementById('btn-next').disabled = (page + 1) * PAGE_SIZE >= filtered.length;
}

function changePage(dir) {
  page += dir;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function applyFilter() {
  const q  = document.getElementById('search').value.toLowerCase();
  const src = document.getElementById('filter-source').value;
  const fr  = document.getElementById('filter-from').value;
  const to  = document.getElementById('filter-to').value;
  filtered = all.filter(r =>
    (!q   || (r.items?.item_name ?? r.item_id ?? '').toLowerCase().includes(q) || (r.ref ?? '').toLowerCase().includes(q)) &&
    (!src || r.source === src) &&
    (!fr  || r.date >= fr) &&
    (!to  || r.date <= to)
  );
  page = 0;
  renderPage();
}

function populateSelect() {
  document.getElementById('adj-item').innerHTML =
    items.map(i => `<option value="${i.item_id}">${i.item_name} (${i.item_id})</option>`).join('');
}

async function saveAdj() {
  const dir = document.getElementById('adj-dir').value;
  const qty = Number(document.getElementById('adj-qty').value);
  const payload = {
    date:    document.getElementById('adj-date').value,
    item_id: document.getElementById('adj-item').value,
    in_qty:  dir === 'in'  ? qty : 0,
    out_qty: dir === 'out' ? qty : 0,
    source:  'ADJUSTMENT',
    ref:     document.getElementById('adj-ref').value.trim() || null,
  };
  if (!payload.date || !payload.item_id || !qty) {
    showToast('All fields required', 'error'); return;
  }
  const { error } = await db.from('stock_ledger').insert(payload);
  if (error) { handleSbError(error, 'Adjustment'); return; }
  showToast('Adjustment posted!');
  closeModal('modal-adj');
  load();
}

document.getElementById('btn-adj').addEventListener('click', () => {
  document.getElementById('adj-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('adj-qty').value = '';
  document.getElementById('adj-ref').value = '';
  openModal('modal-adj');
});
load();
</script>
</body>
</html>
