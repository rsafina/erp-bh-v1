<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suppliers — Cafe ERP</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Supplier Master</span>
      <div class="topbar-right"><span class="status-dot"></span><span>Cafe ERP</span></div>
    </div>
    <div class="page-content">
      <div class="page-header">
        <div>
          <h1>Suppliers</h1>
          <p>Manage your supplier contacts and payment terms</p>
        </div>
        <button class="btn btn-primary" id="btn-add-supplier">＋ Add Supplier</button>
      </div>

      <div class="filter-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" class="form-control" placeholder="Search by name or ID…" oninput="applyFilter()" />
        </div>
        <select id="filter-active" class="form-control" style="width:140px" onchange="applyFilter()">
          <option value="">All Status</option>
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="erp-table">
            <thead>
              <tr>
                <th>Supplier ID</th>
                <th>Name</th>
                <th>Contact</th>
                <th>Payment Terms</th>
                <th>Status</th>
                <th>Created</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="suppliers-tbody">
              <tr class="loading-row"><td colspan="7"><div class="loader"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-supplier">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-supplier-title">Add Supplier</span>
      <button class="btn-icon" onclick="closeModal('modal-supplier')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-supplier-original" />
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Supplier ID</label>
          <input type="text" id="s-id" class="form-control" placeholder="e.g. SKN002" />
        </div>
        <div class="form-group">
          <label class="form-label">Supplier Name</label>
          <input type="text" id="s-name" class="form-control" placeholder="e.g. PT Maju Jaya" />
        </div>
        <div class="form-group">
          <label class="form-label">Contact</label>
          <input type="text" id="s-contact" class="form-control" placeholder="Phone / Email" />
        </div>
        <div class="form-group">
          <label class="form-label">Payment Terms</label>
          <input type="text" id="s-terms" class="form-control" placeholder="e.g. Net 30" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="s-active" class="form-control">
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-supplier')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSupplier()">Save Supplier</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
const db = getSupabase();
let all = [];

async function load() {
  const { data, error } = await db.from('suppliers').select('*').order('supplier_id');
  if (error) return handleSbError(error, 'Load suppliers');
  all = data;
  render(data);
}

function render(data) {
  const tbody = document.getElementById('suppliers-tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🏭</div><p>No suppliers found</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td class="mono">${r.supplier_id}</td>
      <td><strong>${r.supplier_name}</strong></td>
      <td class="muted">${r.contact ?? '—'}</td>
      <td class="muted">${r.payment_terms ?? '—'}</td>
      <td><span class="badge ${r.is_active ? 'badge-green' : 'badge-red'}">${r.is_active ? 'Active' : 'Inactive'}</span></td>
      <td class="muted">${fmtDate(r.created_at)}</td>
      <td><button class="btn-icon" title="Edit" onclick="editRow('${r.supplier_id}')">✏</button></td>
    </tr>`).join('');
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  const a = document.getElementById('filter-active').value;
  render(all.filter(r =>
    (!q || r.supplier_name.toLowerCase().includes(q) || r.supplier_id.toLowerCase().includes(q)) &&
    (a === '' || String(r.is_active) === a)
  ));
}

function resetForm() {
  document.getElementById('modal-supplier-title').textContent = 'Add Supplier';
  document.getElementById('edit-supplier-original').value = '';
  ['s-id','s-name','s-contact','s-terms'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('s-id').disabled = false;
  document.getElementById('s-active').value = 'true';
}

function editRow(id) {
  const r = all.find(x => x.supplier_id === id);
  if (!r) return;
  document.getElementById('modal-supplier-title').textContent = 'Edit Supplier';
  document.getElementById('edit-supplier-original').value = r.supplier_id;
  document.getElementById('s-id').value = r.supplier_id;
  document.getElementById('s-id').disabled = true;
  document.getElementById('s-name').value = r.supplier_name;
  document.getElementById('s-contact').value = r.contact ?? '';
  document.getElementById('s-terms').value = r.payment_terms ?? '';
  document.getElementById('s-active').value = String(r.is_active);
  openModal('modal-supplier');
}

async function saveSupplier() {
  const payload = {
    supplier_id:   document.getElementById('s-id').value.trim(),
    supplier_name: document.getElementById('s-name').value.trim(),
    contact:       document.getElementById('s-contact').value.trim() || null,
    payment_terms: document.getElementById('s-terms').value.trim() || null,
    is_active:     document.getElementById('s-active').value === 'true',
  };
  if (!payload.supplier_id || !payload.supplier_name) {
    showToast('ID and Name are required', 'error'); return;
  }
  const orig = document.getElementById('edit-supplier-original').value;
  const { error } = orig
    ? await db.from('suppliers').update(payload).eq('supplier_id', orig)
    : await db.from('suppliers').insert(payload);
  if (error) { handleSbError(error, 'Save supplier'); return; }
  showToast(orig ? 'Supplier updated!' : 'Supplier added!');
  closeModal('modal-supplier');
  load();
}

document.getElementById('btn-add-supplier').addEventListener('click', () => { resetForm(); openModal('modal-supplier'); });
load();
</script>
</body>
</html>
